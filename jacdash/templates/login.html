<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JacDash Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/jacdash.css') }}" />
</head>
<body>
  <main style="max-width:420px;margin:4rem auto;padding:2rem;">
    <h1>Sign in</h1>
    {% if error %}<p style="color:#b00020;">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('local_auth.login_submit') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <label for="username">Username</label>
      <input id="username" name="username" required />
      <label for="password">Password</label>
      <input id="password" type="password" name="password" required />
      <button type="submit">Login</button>
    </form>
  </main>
</body>
</html>
